{% extends "base.html" %}
{% block content %}

<style>
  .login-wrapper {
    min-height: 75vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-card {
    width: 100%;
    max-width: 440px;
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 22px;
    padding: 40px 36px;
    box-shadow: 0 20px 55px rgba(37, 99, 235, 0.15);
    animation: fadeUp 0.6s ease both;
  }

  .dark-mode .login-card {
    background: rgba(17, 24, 39, 0.82);
    border-color: rgba(255, 255, 255, 0.1);
    box-shadow: 0 20px 55px rgba(0, 0, 0, 0.45);
  }

  .login-logo {
    font-size: 2.2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    margin-bottom: 4px;
  }

  .login-subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.92rem;
    margin-bottom: 28px;
  }

  .dark-mode .login-subtitle {
    color: var(--dark-muted);
  }

  .tab-switch {
    display: flex;
    background: rgba(37, 99, 235, 0.08);
    border-radius: 999px;
    padding: 4px;
    margin-bottom: 26px;
    gap: 4px;
  }

  .tab-btn {
    flex: 1;
    border: none;
    background: transparent;
    border-radius: 999px;
    padding: 8px 0;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: 0.3s;
  }

  .tab-btn.active {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #fff;
    box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
  }

  .dark-mode .tab-btn {
    color: var(--dark-muted);
  }

  .dark-mode .tab-btn.active {
    color: #fff;
  }

  .form-section {
    display: none;
  }

  .form-section.active {
    display: block;
    animation: fadeUp 0.4s ease both;
  }

  .form-label {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-dark);
    margin-bottom: 5px;
  }

  .dark-mode .form-label {
    color: var(--dark-text);
  }

  .form-control {
    border-radius: 12px;
    border: 1.5px solid rgba(37, 99, 235, 0.2);
    padding: 10px 14px;
    font-size: 0.92rem;
    transition: border-color 0.3s, box-shadow 0.3s;
    background: rgba(255, 255, 255, 0.9);
  }

  .form-control:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    outline: none;
  }

  .dark-mode .form-control {
    background: rgba(15, 23, 42, 0.85);
    border-color: rgba(255, 255, 255, 0.15);
    color: var(--dark-text);
  }

  .dark-mode .form-control:focus {
    border-color: #93c5fd;
    box-shadow: 0 0 0 3px rgba(147, 197, 253, 0.15);
  }

  .btn-login {
    width: 100%;
    padding: 11px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border: none;
    color: #fff;
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.3px;
    box-shadow: 0 6px 20px rgba(37, 99, 235, 0.38);
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: 8px;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(37, 99, 235, 0.45);
  }

  .alert-msg {
    border-radius: 12px;
    font-size: 0.88rem;
    padding: 10px 14px;
    margin-bottom: 18px;
    animation: fadeUp 0.4s ease both;
  }

  .divider-text {
    text-align: center;
    font-size: 0.78rem;
    color: var(--text-muted);
    margin: 20px 0 14px;
    position: relative;
  }

  .divider-text::before,
  .divider-text::after {
    content: '';
    display: inline-block;
    width: 38%;
    height: 1px;
    background: rgba(37, 99, 235, 0.15);
    vertical-align: middle;
    margin: 0 8px;
  }

  .dark-mode .divider-text {
    color: var(--dark-muted);
  }
</style>

<div class="login-wrapper">
  <div class="login-card" data-aos="fade-up">

    <div class="login-logo">📰 QuickNewsAI</div>
    <p class="login-subtitle">Your intelligent news companion</p>

    <!-- Tab Switch -->
    <div class="tab-switch">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- (Flashes moved to base.html) -->

    <!-- LOGIN FORM -->
    <div class="form-section active" id="form-login">
      <form method="POST" action="/login">
        <input type="hidden" name="form_type" value="login">

        <div class="mb-3">
          <label class="form-label">Username or Email</label>
          <input type="text"
                 class="form-control"
                 name="username_or_email"
                 id="login_username"
                 placeholder="Enter username or email"
                 required autocomplete="username">
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password"
                 class="form-control"
                 name="password"
                 id="login_password"
                 placeholder="Enter your password"
                 required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-login">🔐 Login</button>
        <div class="text-center mt-3">
          <a href="{{ url_for('forgot_password') }}" class="text-muted" style="font-size: 0.85rem;">Forgot password?</a>
        </div>
      </form>

      <div class="divider-text">Don't have an account?</div>
      <div class="text-center">
        <a href="#" onclick="switchTab('register')" class="text-primary fw-500" style="font-size:0.9rem;">
          Create an account →
        </a>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div class="form-section" id="form-register">
      <form method="POST" action="/login">
        <input type="hidden" name="form_type" value="register">

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text"
                 class="form-control"
                 name="username"
                 id="reg_username"
                 placeholder="Choose a username"
                 required autocomplete="username">
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email"
                 class="form-control"
                 name="email"
                 id="reg_email"
                 placeholder="Enter your email"
                 required autocomplete="email">
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password"
                 class="form-control"
                 name="password"
                 id="reg_password"
                 placeholder="Create a password (min 6 chars)"
                 required minlength="6" autocomplete="new-password">
        </div>

        <button type="submit" class="btn-login">🚀 Create Account</button>
      </form>

      <div class="divider-text">Already have an account?</div>
      <div class="text-center">
        <a href="#" onclick="switchTab('login')" class="text-primary fw-500" style="font-size:0.9rem;">
          Back to Login →
        </a>
      </div>
    </div>

  </div>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('form-' + tab).classList.add('active');
  }

  // Auto-switch to register tab if registration error/success
  const currentTab = "{{ active_tab }}";
  if (currentTab === 'register') {
    switchTab('register');
  }
</script>

{% endblock %}
