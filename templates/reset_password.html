{% extends "base.html" %}

{% block content %}
<div class="login-container" style="max-width: 400px; margin: 100px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; margin-bottom: 20px; color: #333;">Reset Password</h2>
    <p style="text-align: center; color: #666; margin-bottom: 25px;">Enter your new password below.</p>
    
    <form action="{{ url_for('reset_password') }}" method="POST">
        <input type="hidden" name="email" value="{{ email }}">
        <input type="hidden" name="otp" value="{{ otp }}">
        <div style="margin-bottom: 20px;">
            <label for="password" style="display: block; margin-bottom: 8px; color: #555;">New Password</label>
            <input type="password" id="password" name="password" required minlength="6" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
        </div>
        
        <button type="submit" style="width: 100%; padding: 14px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; transition: background 0.3s ease;">
            Update Password
        </button>
    </form>
</div>
{% endblock %}
