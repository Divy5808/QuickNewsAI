{% extends "base.html" %}

{% block content %}
<div class="login-container" style="max-width: 400px; margin: 100px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; margin-bottom: 20px; color: #333;">Verify Reset OTP</h2>
    <p style="text-align: center; color: #666; margin-bottom: 25px;">Enter the 6-digit code sent to <strong>{{ email }}</strong> to reset your password.</p>
    
    <form action="{{ url_for('verify_reset_otp') }}" method="POST">
        <input type="hidden" name="email" value="{{ email }}">
        
        <div style="margin-bottom: 20px;">
            <label for="otp" style="display: block; margin-bottom: 8px; color: #555;">Enter OTP</label>
            <input type="text" id="otp" name="otp" required maxlength="6" pattern="\d{6}" placeholder="123456" 
                   style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; text-align: center; font-size: 24px; letter-spacing: 5px;">
        </div>
        
        <button type="submit" style="width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; transition: background 0.3s ease;">
            Verify OTP
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <a href="{{ url_for('forgot_password') }}" style="color: #666; text-decoration: none; font-size: 14px;">Resend OTP</a>
    </div>
</div>
{% endblock %}
