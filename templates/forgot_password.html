{% extends "base.html" %}

{% block content %}
<div class="login-container" style="max-width: 400px; margin: 100px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; margin-bottom: 20px; color: #333;">Forgot Password</h2>
    <p style="text-align: center; color: #666; margin-bottom: 25px;">Enter your email address and we'll send you a 6-digit OTP to reset your password.</p>
    
    <form action="{{ url_for('forgot_password') }}" method="POST">
        <div style="margin-bottom: 20px;">
            <label for="email" style="display: block; margin-bottom: 8px; color: #555;">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="example@email.com" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
        </div>
        
        <button type="submit" style="width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; transition: background 0.3s ease;">
            Send OTP
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <a href="{{ url_for('login') }}" style="color: #007bff; text-decoration: none; font-size: 14px;">Back to Login</a>
    </div>
</div>
{% endblock %}
